server {
    listen 80;

    # supabase-py builds URLs as <SUPABASE_URL>/rest/v1/<table>. PostgREST
    # serves tables at the root, so we strip the /rest/v1 prefix here.
    location /rest/v1/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Used by dev.sh to wait for the stack to be ready.
    location /health {
        access_log off;
        return 200 "ok\n";
    }
}
